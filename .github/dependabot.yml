version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /tests-integration
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /packages/marketplace-react/examples/marketplace-starter
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /packages/marketplace-react/test-apps/checkout
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /packages/marketplace-react/test-apps/next-ssr
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /packages/marketplace-react/test/playwright
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: /programs/agenc-coordination
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /programs/agenc-coordination/fuzz
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      fuzz-cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /zkvm
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
