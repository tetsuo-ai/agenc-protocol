name: Verifiable Build

# Reproducible / verifiable build of the on-chain `agenc-coordination` program.
#
# WHY: the program custodies escrow, completion bonds, and agent stakes. A
# reproducible build lets anyone confirm the bytecode deployed at
# `HJsZ53Zb27b8QMRbQpuDngE44AdwCGxvEZr61Zmxw1xK` was produced from a specific
# source tag — it is the "money path" supply-chain control (PLAN.md P8.3).
#
# WHAT THIS DOES TODAY:
#   - Builds the program inside the pinned `solana-verify` Docker image so the
#     `.so` is deterministic (same input source -> same output bytes).
#   - Emits the SHA-256 executable hash for BOTH program surfaces:
#       * the production default-feature surface — a release candidate until an
#         independently approved upgrade is confirmed (only then should its hash
#         match `get-program-hash` against mainnet),
#       * the mainnet-canary 25-instruction surface — the historical/alternate
#         restricted build, no longer what is deployed.
#   - Uploads `verifiable-build-hashes.txt` as a workflow artifact. The required
#     caller in `release.yml` attaches it before a protocol release is published.
#
# WHAT THIS DOES *NOT* DO:
#   - It does not mutate the on-chain OtterSec verification PDA or submit a
#     remote verification job. The public repo makes that possible, but the
#     Squads-controlled uploader requires a separately approved ceremony; see
#     docs/VERIFIABLE_BUILDS.md and the rollout runbook.
#
# Targets solana-verify v0.5.x (Solana Foundation fork). The build image's
# Solana CLI version is read from programs/agenc-coordination/Cargo.toml
# [workspace.metadata.cli].solana = "3.0.13" (kept in sync with Anchor.toml).

on:
  # Required by release.yml for protocol tags.
  workflow_call:
  # Manual reproducibility spot-check against any ref.
  workflow_dispatch:

permissions:
  contents: read

# Pin the verifier so the build image and hashing logic are themselves
# reproducible. Bump deliberately and re-record hashes when upgrading.
env:
  SOLANA_VERIFY_VERSION: "0.5.0"
  PROGRAM_ID: "HJsZ53Zb27b8QMRbQpuDngE44AdwCGxvEZr61Zmxw1xK"
  LIBRARY_NAME: "agenc_coordination"
  MOUNT_PATH: "programs/agenc-coordination"

jobs:
  verifiable-build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout (full history so the tag commit is reproducible)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require a tagged release commit from main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Release tag ${GITHUB_REF_NAME} does not point to a commit on main" >&2
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: solana-verify-${{ env.SOLANA_VERIFY_VERSION }}-${{ runner.os }}

      # solana-verify drives a deterministic Docker build; the runner already
      # has Docker. --locked pins the verifier's own dependency tree.
      - name: Install solana-verify
        run: cargo install solana-verify --version "${SOLANA_VERIFY_VERSION}" --locked

      - name: Tool versions (recorded in the log for auditability)
        run: |
          solana-verify --version
          docker --version

      # --- mainnet-canary (25 instructions) — historical/alternate build ---
      # No longer what is deployed (the full surface went live 2026-06-11); its
      # hash is recorded for the record only. Extra cargo args after the `--`
      # separator mirror the canary:build npm script.
      - name: Reproducible build (mainnet-canary surface)
        working-directory: programs/agenc-coordination
        run: |
          solana-verify build \
            --library-name "${LIBRARY_NAME}" \
            -- --no-default-features --features mainnet-canary
          mv "target/deploy/${LIBRARY_NAME}.so" \
             "/tmp/${LIBRARY_NAME}.canary.so"

      - name: Hash the mainnet-canary build
        id: canary_hash
        run: |
          HASH=$(solana-verify get-executable-hash "/tmp/${LIBRARY_NAME}.canary.so")
          if [[ ! "$HASH" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "solana-verify returned an invalid canary executable hash" >&2
            exit 1
          fi
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "mainnet-canary .so SHA-256: ${HASH}"

      # --- PRODUCTION CANDIDATE: default features ---
      # Do not describe this hash as live until a separately approved upgrade is
      # confirmed on-chain. Revision 4 currently exposes 99 instructions while
      # the revision-5 default build intentionally exposes 98.
      - name: Reproducible build (production default-feature surface)
        working-directory: programs/agenc-coordination
        run: |
          solana-verify build --library-name "${LIBRARY_NAME}"
          mv "target/deploy/${LIBRARY_NAME}.so" \
             "/tmp/${LIBRARY_NAME}.full.so"

      - name: Hash the production build
        id: full_hash
        run: |
          HASH=$(solana-verify get-executable-hash "/tmp/${LIBRARY_NAME}.full.so")
          if [[ ! "$HASH" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "solana-verify returned an invalid production executable hash" >&2
            exit 1
          fi
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "full-surface .so SHA-256: ${HASH}"

      - name: Write hash manifest
        env:
          FULL_HASH: ${{ steps.full_hash.outputs.hash }}
          CANARY_HASH: ${{ steps.canary_hash.outputs.hash }}
        run: |
          {
            echo "# AgenC verifiable build hashes"
            echo "#"
            echo "# Program ID:   ${PROGRAM_ID}"
            echo "# Git ref:      ${GITHUB_REF_NAME}"
            echo "# Git commit:   ${GITHUB_SHA}"
            echo "# solana-verify: ${SOLANA_VERIFY_VERSION}"
            echo "# Built:        $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "#"
            echo "# Reproduce locally: see docs/VERIFIABLE_BUILDS.md"
            echo ""
            echo "production (default features) — candidate until an approved on-chain upgrade is confirmed:"
            echo "  ${FULL_HASH}"
            echo ""
            echo "mainnet-canary (--no-default-features --features mainnet-canary) — historical/alternate build, not deployed:"
            echo "  ${CANARY_HASH}"
          } > verifiable-build-hashes.txt
          cat verifiable-build-hashes.txt

      - name: Upload hash manifest as a workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verifiable-build-hashes
          path: verifiable-build-hashes.txt

      # Intentionally manual: the public repo is cloneable, but the on-chain
      # verification PDA is controlled by the Squads vault. Activate this only
      # as part of an approved post-deploy ceremony AND after the production
      # hash above matches `get-program-hash` against mainnet.
      #
      # - name: Verify deployed program matches this repo (PUBLIC REPO ONLY)
      #   run: |
      #     solana-verify verify-from-repo \
      #       -u "$MAINNET_RPC_URL" \
      #       --program-id "${PROGRAM_ID}" \
      #       --library-name "${LIBRARY_NAME}" \
      #       --mount-path "${MOUNT_PATH}" \
      #       --commit-hash "${GITHUB_SHA}" \
      #       https://github.com/tetsuo-ai/agenc-protocol
      #       # (production/default surface — only after it is live on mainnet)
