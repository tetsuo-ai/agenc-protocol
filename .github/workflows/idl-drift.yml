# IDL drift + canary freeze gate — closes audit finding L-2 (vacuous drift gate).
#
# WHY: `npm run artifacts:check` (ci.yml, release.yml) runs WITHOUT an
# `anchor build`, so `scripts/sync-anchor-artifacts.mjs --check` used to take
# its "Anchor build artifacts not present" early return and pass without ever
# comparing the Rust program against the committed IDL/types. Program -> IDL
# drift was therefore never detected in CI, and the canary IDL freeze gate
# (`canary:idl` + `canary:check-idl`) was wired into no workflow at all.
#
# WHAT THIS DOES:
#   1. Installs anchor-cli 0.32.1 (crates.io, cached) + Solana platform tools
#      3.0.13 (same pin as sdk.yml / Anchor.toml [toolchain]).
#   2. Runs a real `anchor build` so target/idl + target/types are FRESH.
#   3. Runs `npm run artifacts:check:built` — the drift check with
#      --require-build, which HARD-FAILS (instead of silently passing) if the
#      freshly built artifacts are ever absent. The gate can no longer pass
#      vacuously.
#   4. Builds the restricted canary SBF + IDL, checks the frozen 25-instruction
#      wire shape, and executes its opt-in LiteSVM semantic surface regressions.
#      This happens only after every production artifact comparison, because the
#      canary build intentionally overwrites the shared deploy `.so` path.
#
# COST: the anchor-cli install (~10-15 min) and anchor build are heavy on a
# cold cache; both are cached below, so warm runs are dominated by the
# incremental build. This is comparable to the cargo build-sbf job sdk.yml
# already runs.
#
# The same gate can always be run locally:
#   anchor build && npm run artifacts:check:built && npm run canary:build && npm run canary:idl && npm run canary:check-idl && AGENC_CANARY_LITESVM=1 node --test tests-integration/canary-*.test.mjs

name: IDL Drift

# Least privilege (F-19): this job only reads the repo and writes build caches.
permissions:
  contents: read

env:
  AGAVE_VERSION: v3.0.13
  AGAVE_INSTALL_INIT_SHA256: 1a4e96d884a4df7f204240ea8a0e2ce5a4ca71257bc5ce32ae140e1f6bc140d8

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  idl-drift:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.85.0

      - name: Pin declared npm toolchain
        run: npm install --global npm@11.18.0 && npm --version | grep -Fx 11.18.0

      - name: Cache anchor CLI binary
        id: cache-anchor
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-cli-0.32.1-${{ runner.os }}

      # Version pinned to Anchor.toml [toolchain].anchor_version. No prebuilt
      # npm binary exists for 0.32.x (@coral-xyz/anchor-cli stops at 0.31.2),
      # so build from crates.io once and cache the binary.
      - name: Install Anchor native build dependencies (cache miss only)
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends libudev-dev pkg-config

      - name: Install anchor CLI (cache miss only)
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: cargo install anchor-cli@0.32.1 --locked --force

      # anchor build shells out to cargo build-sbf; pin matches Anchor.toml
      # [toolchain].solana_version and the sdk.yml e2e job.
      - name: Install Solana platform tools
        run: |
          curl -sSfL --retry 3 \
            "https://github.com/anza-xyz/agave/releases/download/${AGAVE_VERSION}/agave-install-init-x86_64-unknown-linux-gnu" \
            -o "${RUNNER_TEMP}/agave-install-init"
          echo "${AGAVE_INSTALL_INIT_SHA256}  ${RUNNER_TEMP}/agave-install-init" | sha256sum -c -
          chmod +x "${RUNNER_TEMP}/agave-install-init"
          "${RUNNER_TEMP}/agave-install-init" "${AGAVE_VERSION}"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry + build target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: idl-drift-${{ runner.os }}-${{ hashFiles('programs/agenc-coordination/Cargo.lock', 'programs/agenc-coordination/Cargo.toml') }}

      - name: Install Node dependencies
        run: npm ci

      # tests-integration is deliberately outside the root npm workspace. The
      # compiled canary harness imports Anchor/web3/SPL from its independently
      # pinned lockfile, so a clean runner must install that tree explicitly.
      - name: Install compiled canary integration dependencies
        run: npm ci
        working-directory: tests-integration

      # Fresh full-surface build: regenerates target/idl/agenc_coordination.json
      # and target/types/agenc_coordination.ts from the Rust source.
      - name: Anchor build (full surface, default features)
        run: anchor build

      - name: Reject SBF stack-frame overflows
        run: npm run check:stack

      # HARD drift gate: --require-build makes the check fail (exit 1) if the
      # built artifacts are missing, so this step can never pass vacuously.
      - name: Verify committed protocol artifacts against the fresh build
        run: npm run artifacts:check:built

      # Canary gates run after every production artifact comparison because this
      # restricted build overwrites the shared program deploy `.so` path.
      - name: Build mainnet-canary SBF
        run: npm run canary:build

      - name: Build mainnet-canary IDL
        run: npm run canary:idl

      - name: Verify frozen canary IDL surface
        run: npm run canary:check-idl

      - name: Compiled mainnet-canary LiteSVM regression
        env:
          AGENC_CANARY_LITESVM: "1"
        run: node --test tests-integration/canary-*.test.mjs
