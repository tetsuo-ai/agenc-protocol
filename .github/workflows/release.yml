name: Release

# Tag-triggered npm publish. Tag formats:
#   protocol-vX.Y.Z  -> publishes @tetsuo-ai/protocol
#   sdk-vX.Y.Z       -> publishes @tetsuo-ai/marketplace-sdk
#   react-vX.Y.Z     -> publishes @tetsuo-ai/marketplace-react
#   tools-vX.Y.Z     -> publishes @tetsuo-ai/marketplace-tools
#   mcp-vX.Y.Z       -> publishes @tetsuo-ai/marketplace-mcp
#
# Publish order matters for first-time installs: sdk before tools/react,
# tools before mcp (dependency ranges point at the published versions).
#
# Requires the NPM_TOKEN repo secret (npm automation token with publish rights
# to the @tetsuo-ai scope). Provisioning that secret is a human-owned step.
#
# NOTE on provenance: `npm publish --provenance` requires a PUBLIC repository
# (the attestation goes to a public transparency log). This repo is currently
# private, so provenance is OFF. When the repo goes public (PLAN.md P0.6/P8.3),
# add `--provenance` to both publish commands below.
#
# NOTE on verifiable builds: `.github/workflows/verify.yml` runs on the same
# `protocol-v*` tags and attaches the reproducible on-chain program build hash
# (`verifiable-build-hashes.txt`) to the Release this workflow creates. Full
# third-party source-verification (solana-verify verify-from-repo / osec.io) is
# gated on the repo going public — see docs/VERIFIABLE_BUILDS.md.

on:
  push:
    tags:
      - "protocol-v*"
      - "sdk-v*"
      - "react-v*"
      - "tools-v*"
      - "mcp-v*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC for npm provenance (no-op until provenance is enabled)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Resolve package from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          case "$TAG" in
            protocol-v*)
              echo "name=@tetsuo-ai/protocol" >> "$GITHUB_OUTPUT"
              echo "dir=packages/protocol" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#protocol-v}" >> "$GITHUB_OUTPUT"
              ;;
            sdk-v*)
              echo "name=@tetsuo-ai/marketplace-sdk" >> "$GITHUB_OUTPUT"
              echo "dir=packages/sdk-ts" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#sdk-v}" >> "$GITHUB_OUTPUT"
              ;;
            react-v*)
              echo "name=@tetsuo-ai/marketplace-react" >> "$GITHUB_OUTPUT"
              echo "dir=packages/marketplace-react" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#react-v}" >> "$GITHUB_OUTPUT"
              ;;
            tools-v*)
              echo "name=@tetsuo-ai/marketplace-tools" >> "$GITHUB_OUTPUT"
              echo "dir=packages/marketplace-tools" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#tools-v}" >> "$GITHUB_OUTPUT"
              ;;
            mcp-v*)
              echo "name=@tetsuo-ai/marketplace-mcp" >> "$GITHUB_OUTPUT"
              echo "dir=packages/marketplace-mcp" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#mcp-v}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unrecognized tag: $TAG" >&2; exit 1
              ;;
          esac

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./${{ steps.pkg.outputs.dir }}/package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.pkg.outputs.version }}" ]; then
            echo "Tag version ${{ steps.pkg.outputs.version }} != package.json $PKG_VERSION" >&2
            exit 1
          fi

      # --- Gate: SDK / MCP / react (on-chain e2e needs the compiled program) ---
      - name: Setup Rust (e2e)
        if: startsWith(github.ref_name, 'sdk-v') || startsWith(github.ref_name, 'mcp-v') || startsWith(github.ref_name, 'react-v')
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana platform tools (e2e)
        if: startsWith(github.ref_name, 'sdk-v') || startsWith(github.ref_name, 'mcp-v') || startsWith(github.ref_name, 'react-v')
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.0.13/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Build program for e2e
        if: startsWith(github.ref_name, 'sdk-v') || startsWith(github.ref_name, 'mcp-v') || startsWith(github.ref_name, 'react-v')
        run: cargo build-sbf --manifest-path programs/agenc-coordination/Cargo.toml

      - name: SDK gate (drift, typecheck, tests incl. e2e, build, examples)
        if: startsWith(github.ref_name, 'sdk-v')
        working-directory: packages/sdk-ts
        run: |
          npm run sdk:drift
          npx tsc --noEmit
          npm test
          npm run build
          npm run examples:check
          node scripts/pack-smoke.mjs

      # react/tools/mcp typecheck + test against the workspace-linked sdk,
      # whose types/runtime live in dist/ — build it first.
      - name: Build workspace sdk (react/tools/mcp gates)
        if: startsWith(github.ref_name, 'react-v') || startsWith(github.ref_name, 'tools-v') || startsWith(github.ref_name, 'mcp-v')
        working-directory: packages/sdk-ts
        run: npm run build

      # --- Gate: react (signers e2e boots the litesvm sandbox -> needs the .so) ---
      - name: React gate (typecheck, tests, build)
        if: startsWith(github.ref_name, 'react-v')
        working-directory: packages/marketplace-react
        run: |
          node ../sdk-ts/scripts/sync-testing-so.mjs
          npm run typecheck
          npm test
          npm run build

      # --- Gate: tools ---
      - name: Tools gate (typecheck, tests, build)
        if: startsWith(github.ref_name, 'tools-v')
        working-directory: packages/marketplace-tools
        run: |
          npm run typecheck
          npm test
          npm run build

      # --- Gate: mcp (litesvm e2e boots the real .so via the SDK testing sandbox) ---
      - name: Build workspace tools (mcp gate)
        if: startsWith(github.ref_name, 'mcp-v')
        working-directory: packages/marketplace-tools
        run: npm run build

      - name: MCP gate (typecheck, tests incl. e2e, build)
        if: startsWith(github.ref_name, 'mcp-v')
        working-directory: packages/marketplace-mcp
        run: |
          node ../sdk-ts/scripts/sync-testing-so.mjs
          npm run typecheck
          npm test
          npm run build

      # --- Gate: protocol ---
      # The drift check must compare against a FRESH build, not pass vacuously
      # (audit L-2): mirror idl-drift.yml's toolchain so `artifacts:check:built`
      # (--require-build) has real target/idl + target/types to compare.
      - name: Setup Rust (protocol gate)
        if: startsWith(github.ref_name, 'protocol-v')
        uses: dtolnay/rust-toolchain@stable

      - name: Cache anchor CLI binary (protocol gate)
        if: startsWith(github.ref_name, 'protocol-v')
        id: cache-anchor-protocol
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-cli-0.32.1-${{ runner.os }}

      - name: Install anchor CLI (cache miss only)
        if: startsWith(github.ref_name, 'protocol-v') && steps.cache-anchor-protocol.outputs.cache-hit != 'true'
        run: cargo install anchor-cli@0.32.1 --locked --force

      - name: Install Solana platform tools (protocol gate)
        if: startsWith(github.ref_name, 'protocol-v')
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.0.13/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Anchor build (protocol gate — fresh IDL/types for the drift check)
        if: startsWith(github.ref_name, 'protocol-v')
        run: anchor build

      - name: Protocol gate (artifacts check, build, typecheck, pack smoke)
        if: startsWith(github.ref_name, 'protocol-v')
        run: |
          npm run artifacts:check:built
          npm run build
          npm run typecheck
          npm run pack:smoke

      # Both publish steps are idempotent so a re-run after a partial failure
      # converges instead of dying on the already-done half.
      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version > /dev/null 2>&1; then
            echo "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} already on npm — skipping publish"
          else
            npm publish --access public
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — skipping"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" \
              --notes "See ${{ steps.pkg.outputs.dir }}/CHANGELOG.md for details."
          fi
