name: Release

# Tag-triggered npm publish. Tag formats:
#   protocol-vX.Y.Z  -> publishes @tetsuo-ai/protocol
#   sdk-vX.Y.Z       -> publishes @tetsuo-ai/marketplace-sdk
#   react-vX.Y.Z     -> publishes @tetsuo-ai/marketplace-react
#   tools-vX.Y.Z     -> publishes @tetsuo-ai/marketplace-tools
#   mcp-vX.Y.Z       -> publishes @tetsuo-ai/marketplace-mcp
#   moderation-vX.Y.Z -> publishes @tetsuo-ai/marketplace-moderation
#   worker-vX.Y.Z     -> publishes @tetsuo-ai/agenc-worker
#   cli-vX.Y.Z        -> publishes @tetsuo-ai/agenc-cli
#   cli-alias-vX.Y.Z  -> publishes agenc-cli
#
# Publish order matters for first-time installs. The enforced dependency DAG is
# protocol -> sdk/moderation; sdk -> react/tools/worker; tools -> mcp;
# sdk+worker -> cli; cli -> alias (dependency ranges point at published versions).
#
# Requires the NPM_TOKEN repo secret (npm automation token with publish rights
# to the @tetsuo-ai scope). Provisioning that secret is a human-owned step.
#
# npm provenance is mandatory for every publish. The repository is public and
# this workflow has `id-token: write`, so npm can bind each tarball to this exact
# GitHub Actions run in the public transparency log.
#
# NOTE on verifiable builds: protocol releases call `.github/workflows/verify.yml`
# as a required job. Publication cannot begin unless its reproducible on-chain
# build succeeds, and the resulting hash manifest is attached while the GitHub
# Release is still a draft. Third-party on-chain source verification remains a
# separately approved Squads ceremony — see docs/VERIFIABLE_BUILDS.md.

on:
  push:
    tags:
      - "protocol-v*"
      - "sdk-v*"
      - "react-v*"
      - "tools-v*"
      - "mcp-v*"
      - "moderation-v*"
      - "worker-v*"
      - "cli-v*"
      - "cli-alias-v*"

permissions:
  contents: read

env:
  AGAVE_VERSION: v3.0.13
  AGAVE_INSTALL_INIT_SHA256: 1a4e96d884a4df7f204240ea8a0e2ce5a4ca71257bc5ce32ae140e1f6bc140d8
  RELEASE_PACKAGE_GATES_JSON: '[{"id":"protocol","name":"@tetsuo-ai/protocol","directory":"packages/protocol"},{"id":"sdk","name":"@tetsuo-ai/marketplace-sdk","directory":"packages/sdk-ts"},{"id":"react","name":"@tetsuo-ai/marketplace-react","directory":"packages/marketplace-react"},{"id":"tools","name":"@tetsuo-ai/marketplace-tools","directory":"packages/marketplace-tools"},{"id":"mcp","name":"@tetsuo-ai/marketplace-mcp","directory":"packages/marketplace-mcp"},{"id":"moderation","name":"@tetsuo-ai/marketplace-moderation","directory":"packages/marketplace-moderation"},{"id":"worker","name":"@tetsuo-ai/agenc-worker","directory":"packages/agenc-worker"},{"id":"cli","name":"@tetsuo-ai/agenc-cli","directory":"packages/agenc-cli"},{"id":"cli-alias","name":"agenc-cli","directory":"packages/agenc-cli-alias"}]'

# Package tags share dependency/order constraints and publish credentials.
# Serialize them so two near-simultaneous tags cannot race npm publication.
concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  resolve_release:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      id: ${{ steps.pkg.outputs.id }}
    steps:
      - name: Checkout release identity
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require a release commit from main
        run: |
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Release tag ${GITHUB_REF_NAME} does not point to a commit on main" >&2
            exit 1
          fi

      - name: Setup Node for trusted resolution
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Pin declared npm release toolchain
        run: npm install --global npm@11.18.0 && npm --version | grep -Fx 11.18.0

      - name: Verify triggering tag identity
        run: node scripts/verify-release-tag-binding.mjs

      - name: Install trusted resolver dependencies
        run: npm ci --ignore-scripts

      - name: Resolve package identity before routed jobs
        id: pkg
        run: node scripts/release-policy.mjs resolve

      - name: Require exact package gate coverage
        env:
          RESOLVED_PACKAGE_ID: ${{ steps.pkg.outputs.id }}
        run: node scripts/release-policy.mjs gates

  protocol_verifiable_build:
    needs: resolve_release
    if: needs.resolve_release.outputs.id == 'protocol'
    permissions:
      contents: read
    uses: ./.github/workflows/verify.yml

  rust_supply_chain:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-supply-chain.yml

  release:
    needs: [resolve_release, protocol_verifiable_build, rust_supply_chain]
    if: ${{ always() && needs.resolve_release.result == 'success' && needs.rust_supply_chain.result == 'success' && (needs.protocol_verifiable_build.result == 'success' || needs.protocol_verifiable_build.result == 'skipped') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    environment: production-release
    permissions:
      actions: read
      contents: write # create/finalize the GitHub Release
      id-token: write # OIDC for mandatory npm provenance
    steps:
      - name: Checkout
        # v6.0.2+ preserves annotated tag objects instead of converting them to
        # lightweight tags; verify-release-tag-binding relies on that identity.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require a release commit from main
        run: |
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Release tag ${GITHUB_REF_NAME} does not point to a commit on main" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Pin declared npm release toolchain
        run: npm install --global npm@11.18.0 && npm --version | grep -Fx 11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Install independent npm license evidence
        run: npm ci --prefix tests-integration --ignore-scripts

      - name: Enforce release-time npm license policy
        run: node scripts/check-npm-licenses.mjs

      - name: Resolve package from tag
        id: pkg
        run: node scripts/release-policy.mjs resolve

      - name: Reconfirm exact package gate coverage
        env:
          RESOLVED_PACKAGE_ID: ${{ steps.pkg.outputs.id }}
        run: node scripts/release-policy.mjs gates

      - name: Verify exact attested release prerequisites
        run: node scripts/release-policy.mjs prerequisites

      # --- Gate: SDK / MCP / react (on-chain e2e needs the compiled program) ---
      - name: Setup Rust (e2e)
        if: steps.pkg.outputs.id == 'sdk' || steps.pkg.outputs.id == 'mcp' || steps.pkg.outputs.id == 'react' || steps.pkg.outputs.id == 'worker' || steps.pkg.outputs.id == 'cli'
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.85.0

      - name: Install Solana platform tools (e2e)
        if: steps.pkg.outputs.id == 'sdk' || steps.pkg.outputs.id == 'mcp' || steps.pkg.outputs.id == 'react' || steps.pkg.outputs.id == 'worker' || steps.pkg.outputs.id == 'cli'
        run: |
          curl -sSfL --retry 3 \
            "https://github.com/anza-xyz/agave/releases/download/${AGAVE_VERSION}/agave-install-init-x86_64-unknown-linux-gnu" \
            -o "${RUNNER_TEMP}/agave-install-init"
          echo "${AGAVE_INSTALL_INIT_SHA256}  ${RUNNER_TEMP}/agave-install-init" | sha256sum -c -
          chmod +x "${RUNNER_TEMP}/agave-install-init"
          "${RUNNER_TEMP}/agave-install-init" "${AGAVE_VERSION}"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Build program for e2e
        if: steps.pkg.outputs.id == 'sdk' || steps.pkg.outputs.id == 'mcp' || steps.pkg.outputs.id == 'react' || steps.pkg.outputs.id == 'worker' || steps.pkg.outputs.id == 'cli'
        run: cargo build-sbf --manifest-path programs/agenc-coordination/Cargo.toml

      - name: SDK gate (drift, typecheck, tests incl. e2e, build, examples)
        if: steps.pkg.outputs.id == 'sdk'
        working-directory: packages/sdk-ts
        env:
          RELEASE_COMPLETES_PACKAGE_ID: sdk
        run: |
          npm run sdk:drift
          npx tsc --noEmit
          npm test
          npm run build
          npm run examples:check
          node scripts/pack-smoke.mjs
          node "${GITHUB_WORKSPACE}/scripts/release-policy.mjs" complete-gate

      # react/tools/mcp typecheck + test against the workspace-linked sdk,
      # whose types/runtime live in dist/ — build it first.
      - name: Build workspace sdk (react/tools/mcp gates)
        if: steps.pkg.outputs.id == 'react' || steps.pkg.outputs.id == 'tools' || steps.pkg.outputs.id == 'mcp' || steps.pkg.outputs.id == 'worker' || steps.pkg.outputs.id == 'cli'
        working-directory: packages/sdk-ts
        run: npm run build

      # --- Gate: react (signers e2e boots the litesvm sandbox -> needs the .so) ---
      - name: React gate (typecheck, tests, build)
        if: steps.pkg.outputs.id == 'react'
        working-directory: packages/marketplace-react
        env:
          RELEASE_COMPLETES_PACKAGE_ID: react
        run: |
          node ../sdk-ts/scripts/sync-testing-so.mjs
          npm run typecheck
          npm test
          npm run test:localnet
          npm run build
          node "${GITHUB_WORKSPACE}/scripts/release-policy.mjs" complete-gate

      # --- Gate: tools ---
      - name: Tools gate (typecheck, tests, build)
        if: steps.pkg.outputs.id == 'tools'
        working-directory: packages/marketplace-tools
        env:
          RELEASE_COMPLETES_PACKAGE_ID: tools
        run: |
          npm run typecheck
          npm test
          npm run build
          node "${GITHUB_WORKSPACE}/scripts/release-policy.mjs" complete-gate

      # --- Gate: mcp (litesvm e2e boots the real .so via the SDK testing sandbox) ---
      - name: Build workspace tools (mcp gate)
        if: steps.pkg.outputs.id == 'mcp'
        working-directory: packages/marketplace-tools
        run: npm run build

      - name: MCP gate (typecheck, tests incl. e2e, build)
        if: steps.pkg.outputs.id == 'mcp'
        working-directory: packages/marketplace-mcp
        env:
          RELEASE_COMPLETES_PACKAGE_ID: mcp
        run: |
          node ../sdk-ts/scripts/sync-testing-so.mjs
          npm run typecheck
          npm test
          npm run build
          node "${GITHUB_WORKSPACE}/scripts/release-policy.mjs" complete-gate

      - name: Moderation gate (typecheck, tests, build)
        if: steps.pkg.outputs.id == 'moderation'
        working-directory: packages/marketplace-moderation
        env:
          RELEASE_COMPLETES_PACKAGE_ID: moderation
        run: |
          npm run typecheck
          npm test
          npm run build
          node "${GITHUB_WORKSPACE}/scripts/release-policy.mjs" complete-gate

      - name: Sync production program into SDK test assets (worker/CLI gates)
        if: steps.pkg.outputs.id == 'worker' || steps.pkg.outputs.id == 'cli'
        working-directory: packages/sdk-ts
        run: npm run testing:sync-so

      - name: Worker gate (typecheck, unit/e2e tests, build)
        if: steps.pkg.outputs.id == 'worker' || steps.pkg.outputs.id == 'cli'
        working-directory: packages/agenc-worker
        env:
          RELEASE_COMPLETES_PACKAGE_ID: worker
          RESOLVED_PACKAGE_ID: ${{ steps.pkg.outputs.id }}
        run: |
          npm run typecheck
          npm test
          npm run build
          if [ "${RESOLVED_PACKAGE_ID}" = "${RELEASE_COMPLETES_PACKAGE_ID}" ]; then
            node "${GITHUB_WORKSPACE}/scripts/release-policy.mjs" complete-gate
          fi

      - name: CLI gate (typecheck, unit/e2e tests, build)
        if: steps.pkg.outputs.id == 'cli'
        working-directory: packages/agenc-cli
        env:
          RELEASE_COMPLETES_PACKAGE_ID: cli
        run: |
          npm run typecheck
          npm test
          npm run build
          node "${GITHUB_WORKSPACE}/scripts/release-policy.mjs" complete-gate

      - name: CLI alias dependency and entrypoint gate
        if: steps.pkg.outputs.id == 'cli-alias'
        working-directory: packages/agenc-cli-alias
        env:
          RELEASE_COMPLETES_PACKAGE_ID: cli-alias
        run: |
          node -e 'const p=require("./package.json"); if (p.dependencies["@tetsuo-ai/agenc-cli"] !== `^${p.version}`) process.exit(1)'
          node --check bin/agenc-cli.js
          node "${GITHUB_WORKSPACE}/scripts/release-policy.mjs" complete-gate

      # --- Gate: protocol ---
      - name: Install deployment/preflight dependencies
        if: steps.pkg.outputs.id == 'protocol'
        run: npm ci
        working-directory: tests-integration

      - name: Audit independent deployment/preflight dependencies
        if: steps.pkg.outputs.id == 'protocol'
        run: npm run audit:tests-integration

      # The drift check must compare against a FRESH build, not pass vacuously
      # (audit L-2): mirror idl-drift.yml's toolchain so `artifacts:check:built`
      # (--require-build) has real target/idl + target/types to compare.
      - name: Setup Rust (protocol gate)
        if: steps.pkg.outputs.id == 'protocol'
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy

      - name: Protocol Rust release matrix
        if: steps.pkg.outputs.id == 'protocol'
        run: |
          cargo fmt --manifest-path programs/agenc-coordination/Cargo.toml --all --check
          cargo clippy --manifest-path programs/agenc-coordination/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path programs/agenc-coordination/Cargo.toml --all-targets
          cargo clippy --manifest-path programs/agenc-coordination/Cargo.toml --all-targets --features validation-timings -- -D warnings
          cargo test --manifest-path programs/agenc-coordination/Cargo.toml --all-targets --features validation-timings
          cargo clippy --manifest-path programs/agenc-coordination/Cargo.toml --all-targets --features private-zk -- -D warnings
          cargo test --manifest-path programs/agenc-coordination/Cargo.toml --all-targets --features private-zk
          cargo clippy --manifest-path programs/agenc-coordination/Cargo.toml --all-targets --no-default-features --features mainnet-canary -- -D warnings
          cargo test --manifest-path programs/agenc-coordination/Cargo.toml --all-targets --no-default-features --features mainnet-canary
          cargo test --manifest-path programs/agenc-coordination/fuzz/Cargo.toml --all-targets
          npm run test:deployment-scripts

      - name: Reject mixed release surfaces
        if: steps.pkg.outputs.id == 'protocol'
        run: |
          if bare_output=$(cargo check --manifest-path programs/agenc-coordination/Cargo.toml --no-default-features 2>&1); then
            echo "bare --no-default-features unexpectedly compiled an unnamed full surface" >&2
            exit 1
          fi
          grep -F "the full protocol surface requires spl-token-rewards" <<<"${bare_output}"
          if mixed_output=$(cargo check --manifest-path programs/agenc-coordination/Cargo.toml --features mainnet-canary 2>&1); then
            echo "default features + mainnet-canary unexpectedly compiled" >&2
            exit 1
          fi
          grep -F "mainnet-canary must be built with --no-default-features" <<<"${mixed_output}"
          if mixed_output=$(cargo check --manifest-path programs/agenc-coordination/Cargo.toml --no-default-features --features mainnet-canary,private-zk 2>&1); then
            echo "mainnet-canary + private-zk unexpectedly compiled" >&2
            exit 1
          fi
          grep -F "mainnet-canary and private-zk are mutually exclusive" <<<"${mixed_output}"

      - name: Cache anchor CLI binary (protocol gate)
        if: steps.pkg.outputs.id == 'protocol'
        id: cache-anchor-protocol
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-cli-0.32.1-${{ runner.os }}

      - name: Install Anchor native build dependencies (cache miss only)
        if: steps.pkg.outputs.id == 'protocol' && steps.cache-anchor-protocol.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends libudev-dev pkg-config

      - name: Install anchor CLI (cache miss only)
        if: steps.pkg.outputs.id == 'protocol' && steps.cache-anchor-protocol.outputs.cache-hit != 'true'
        run: cargo install anchor-cli@0.32.1 --locked --force

      - name: Install Solana platform tools (protocol gate)
        if: steps.pkg.outputs.id == 'protocol'
        run: |
          curl -sSfL --retry 3 \
            "https://github.com/anza-xyz/agave/releases/download/${AGAVE_VERSION}/agave-install-init-x86_64-unknown-linux-gnu" \
            -o "${RUNNER_TEMP}/agave-install-init"
          echo "${AGAVE_INSTALL_INIT_SHA256}  ${RUNNER_TEMP}/agave-install-init" | sha256sum -c -
          chmod +x "${RUNNER_TEMP}/agave-install-init"
          "${RUNNER_TEMP}/agave-install-init" "${AGAVE_VERSION}"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Anchor build (protocol gate — fresh IDL/types for the drift check)
        if: steps.pkg.outputs.id == 'protocol'
        run: anchor build

      - name: Reject SBF stack-frame overflows (protocol gate)
        if: steps.pkg.outputs.id == 'protocol'
        run: npm run check:stack

      - name: Compiled-program integration suite (protocol gate)
        if: steps.pkg.outputs.id == 'protocol'
        run: node --test tests-integration/*.test.mjs

      - name: Protocol gate (artifacts check, build, typecheck, pack smoke)
        if: steps.pkg.outputs.id == 'protocol'
        run: |
          npm run artifacts:check:built
          npm run build
          npm run typecheck
          npm run pack:smoke

      # Canary gates run only after every production build/artifact/package gate:
      # `canary:build` intentionally overwrites the shared deploy `.so` path.
      # Tag pushes bypass PR checks, so verify both the frozen wire shape and the
      # compiled timeout-settlement behavior here.
      - name: Build mainnet-canary SBF (protocol gate)
        if: steps.pkg.outputs.id == 'protocol'
        run: npm run canary:build

      - name: Build mainnet-canary IDL (protocol gate)
        if: steps.pkg.outputs.id == 'protocol'
        run: npm run canary:idl

      - name: Verify frozen canary IDL surface (protocol gate)
        if: steps.pkg.outputs.id == 'protocol'
        run: npm run canary:check-idl

      - name: Compiled mainnet-canary LiteSVM regression (protocol gate)
        if: steps.pkg.outputs.id == 'protocol'
        env:
          AGENC_CANARY_LITESVM: "1"
          RELEASE_COMPLETES_PACKAGE_ID: protocol
        run: |
          node --test tests-integration/canary-*.test.mjs
          node scripts/release-policy.mjs complete-gate

      - name: Require completed routed package gate
        run: node scripts/release-policy.mjs verify-gate

      - name: Audit runtime npm dependencies
        run: npm audit --omit=dev --workspaces

      - name: Download required verifiable-build hashes
        if: steps.pkg.outputs.id == 'protocol'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: verifiable-build-hashes

      - name: Require finalized mainnet cutover for stable releases
        env:
          AGENC_MAINNET_RPC_URLS_JSON: ${{ vars.AGENC_MAINNET_RPC_URLS_JSON }}
          EXPECTED_MAINNET_PROGRAM_SHA256: ${{ vars.AGENC_MAINNET_PROGRAM_SHA256 }}
          EXPECTED_VERIFIED_SOURCE_COMMIT: ${{ vars.AGENC_VERIFIED_SOURCE_COMMIT }}
          VERIFIABLE_BUILD_MANIFEST: verifiable-build-hashes.txt
        run: node scripts/release-policy.mjs cutover

      # Lifecycle stdout is not JSON, even with `npm pack --json --silent`.
      # Run the reviewed prepack explicitly, then suppress lifecycle execution
      # during the JSON-producing pack so every downstream parser receives one
      # uncontaminated npm record.
      - name: Run reviewed package prepack lifecycle
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm run prepack --if-present

      - name: Build reviewed npm tarball
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm pack --ignore-scripts --json > "${RUNNER_TEMP}/package-pack.json"

      - name: Smoke the exact reviewed tarball surface
        env:
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
          PACKAGE_DIR: ${{ steps.pkg.outputs.dir }}
          PACK_JSON: ${{ runner.temp }}/package-pack.json
        run: node scripts/release-pack-smoke.mjs

      - name: Generate deterministic SPDX release SBOM
        id: sbom
        env:
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
          PACKAGE_DIR: ${{ steps.pkg.outputs.dir }}
          PACK_JSON: ${{ runner.temp }}/package-pack.json
        run: |
          SOURCE_COMMIT_DATE=$(git show -s --format=%cI "${GITHUB_SHA}")
          export SOURCE_COMMIT_DATE
          node scripts/release-sbom.mjs generate

      - name: Inspect resumable release state before mutation
        id: state
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
          DIST_TAG: ${{ steps.pkg.outputs.dist_tag }}
          PACK_JSON: ${{ runner.temp }}/package-pack.json
          EXPECTED_REVIEWED_INTEGRITY: ${{ steps.pkg.outputs.expected_integrity }}
          REQUIRED_RELEASE_ASSET: ${{ steps.pkg.outputs.id == 'protocol' && 'verifiable-build-hashes.txt' || '' }}
          REQUIRED_RELEASE_ASSET_PATH: ${{ steps.pkg.outputs.id == 'protocol' && 'verifiable-build-hashes.txt' || '' }}
          SBOM_RELEASE_ASSET: ${{ steps.sbom.outputs.name }}
          SBOM_RELEASE_ASSET_PATH: ${{ steps.sbom.outputs.path }}
        run: node scripts/release-state.mjs inspect

      # Create a draft first. A failed hash attachment or npm publish therefore
      # cannot expose a half-formed public GitHub Release.
      - name: Prepare GitHub Release draft
        if: steps.state.outputs.create_draft == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
          PACKAGE_DIR: ${{ steps.pkg.outputs.dir }}
          PRERELEASE: ${{ steps.pkg.outputs.prerelease }}
        run: |
          node "${GITHUB_WORKSPACE}/scripts/verify-release-tag-binding.mjs"
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            echo "release state changed after inspection" >&2
            exit 1
          fi
          PRERELEASE_ARGS=()
          if [ "${PRERELEASE}" = "true" ]; then
            PRERELEASE_ARGS+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --draft \
            "${PRERELEASE_ARGS[@]}" \
            --title "${PACKAGE_NAME}@${PACKAGE_VERSION}" \
            --notes "See ${PACKAGE_DIR}/CHANGELOG.md for details."

      - name: Attach required verifiable-build hashes
        if: steps.pkg.outputs.id == 'protocol' && contains(fromJSON(steps.state.outputs.missing_assets), 'verifiable-build-hashes.txt')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node "${GITHUB_WORKSPACE}/scripts/verify-release-tag-binding.mjs"
          gh release upload "${GITHUB_REF_NAME}" verifiable-build-hashes.txt

      - name: Attach required SPDX release SBOM
        if: contains(fromJSON(steps.state.outputs.missing_assets), steps.sbom.outputs.name)
        env:
          GH_TOKEN: ${{ github.token }}
          SBOM_PATH: ${{ steps.sbom.outputs.path }}
        run: |
          node "${GITHUB_WORKSPACE}/scripts/verify-release-tag-binding.mjs"
          gh release upload "${GITHUB_REF_NAME}" "${SBOM_PATH}"

      - name: Publish reviewed tarball to npm staging tag
        if: steps.state.outputs.publish_npm == 'true'
        working-directory: ${{ steps.pkg.outputs.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
          PACK_FILENAME: ${{ steps.state.outputs.pack_filename }}
        run: |
          node "${GITHUB_WORKSPACE}/scripts/verify-release-tag-binding.mjs"
          npm publish "${PACK_FILENAME}" --access public --provenance --tag agenc-staging

      - name: Verify npm integrity and provenance before changing public dist-tags
        env:
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
          DIST_TAG: ${{ steps.pkg.outputs.dist_tag }}
          PACK_INTEGRITY: ${{ steps.state.outputs.pack_integrity }}
        run: |
          for attempt in $(seq 1 12); do
            if node scripts/release-state.mjs verify-npm; then
              exit 0
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "npm provenance did not converge after 12 attempts" >&2
              exit 1
            fi
            sleep 10
          done

      - name: Advance reviewed npm dist-tag
        if: steps.state.outputs.set_dist_tag == 'true' || steps.state.outputs.publish_npm == 'true' || steps.state.outputs.remove_staging_tag == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
          DIST_TAG: ${{ steps.pkg.outputs.dist_tag }}
        run: |
          node "${GITHUB_WORKSPACE}/scripts/verify-release-tag-binding.mjs"
          npm dist-tag add "${PACKAGE_NAME}@${PACKAGE_VERSION}" "${DIST_TAG}"
          if [ "${{ steps.state.outputs.publish_npm }}" = "true" ] || \
             [ "${{ steps.state.outputs.remove_staging_tag }}" = "true" ]; then
            npm dist-tag rm "${PACKAGE_NAME}" agenc-staging
          fi

      - name: Verify final npm dist-tag still binds reviewed provenance
        env:
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
          DIST_TAG: ${{ steps.pkg.outputs.dist_tag }}
          PACK_INTEGRITY: ${{ steps.state.outputs.pack_integrity }}
          REQUIRE_DIST_TAG: "1"
        run: node scripts/release-state.mjs verify-npm

      - name: Reinspect every immutable release surface before finalization
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
          DIST_TAG: ${{ steps.pkg.outputs.dist_tag }}
          PACK_JSON: ${{ runner.temp }}/package-pack.json
          EXPECTED_REVIEWED_INTEGRITY: ${{ steps.pkg.outputs.expected_integrity }}
          REQUIRED_RELEASE_ASSET: ${{ steps.pkg.outputs.id == 'protocol' && 'verifiable-build-hashes.txt' || '' }}
          REQUIRED_RELEASE_ASSET_PATH: ${{ steps.pkg.outputs.id == 'protocol' && 'verifiable-build-hashes.txt' || '' }}
          SBOM_RELEASE_ASSET: ${{ steps.sbom.outputs.name }}
          SBOM_RELEASE_ASSET_PATH: ${{ steps.sbom.outputs.path }}
        run: node scripts/release-state.mjs finalize

      - name: Publish GitHub Release
        if: steps.state.outputs.publish_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node "${GITHUB_WORKSPACE}/scripts/verify-release-tag-binding.mjs"
          IS_DRAFT=$(gh release view "${GITHUB_REF_NAME}" --json isDraft --jq .isDraft)
          if [ "$IS_DRAFT" = "true" ]; then
            gh release edit "${GITHUB_REF_NAME}" --draft=false
          else
            echo "Release ${GITHUB_REF_NAME} is already public"
          fi
