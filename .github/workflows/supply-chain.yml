name: Supply Chain

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL JavaScript/TypeScript
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4
        with:
          languages: javascript-typescript

      - name: Analyze JavaScript and TypeScript
        uses: github/codeql-action/analyze@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4
        with:
          category: /language:javascript-typescript

  history-secret-scan:
    name: Full-history secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install checksum-pinned gitleaks
        shell: bash
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/gitleaks-${GITLEAKS_VERSION}.tar.gz"
          directory="${RUNNER_TEMP}/gitleaks-bin"
          mkdir -p "${directory}"
          curl --fail --location --silent --show-error --retry 3 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "${archive}"
          printf '%s  %s\n' "${GITLEAKS_SHA256}" "${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${directory}" gitleaks
          test "$("${directory}/gitleaks" version)" = "${GITLEAKS_VERSION}"

      - name: Scan every reachable commit
        run: >-
          "${RUNNER_TEMP}/gitleaks-bin/gitleaks" git
          --redact --no-banner --timeout 300
          --config .gitleaks.toml
          --log-opts="--all --full-history"
          .

  npm-policy:
    name: npm license and policy controls
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Pin declared npm toolchain
        run: npm install --global npm@11.18.0 && npm --version | grep -Fx 11.18.0

      - name: Verify fail-closed npm configuration
        shell: bash
        run: |
          set -euo pipefail
          roots=(
            "."
            "packages/marketplace-react/examples/marketplace-starter"
            "packages/marketplace-react/test-apps/checkout"
            "packages/marketplace-react/test-apps/next-ssr"
            "packages/marketplace-react/test/playwright"
            "tests-integration"
          )
          for root in "${roots[@]}"; do
            (
              cd "${root}"
              test "$(npm config get dangerously-allow-all-scripts)" = "false"
              test "$(npm config get engine-strict)" = "true"
              test "$(npm config get strict-allow-scripts)" = "true"
            )
          done

      - name: Enforce reviewed dependency install scripts
        run: node scripts/check-npm-install-scripts.mjs

      - name: Install license evidence without lifecycle scripts
        run: |
          set -euo pipefail
          roots=(
            "."
            "packages/marketplace-react/examples/marketplace-starter"
            "packages/marketplace-react/test-apps/checkout"
            "packages/marketplace-react/test-apps/next-ssr"
            "packages/marketplace-react/test/playwright"
            "tests-integration"
          )
          for root in "${roots[@]}"; do
            (cd "${root}" && npm ci --ignore-scripts)
          done

      - name: Audit root workspace runtime dependencies
        run: npm audit --omit=dev --workspaces

      - name: Audit independent deployment dependencies
        run: npm run audit:tests-integration

      - name: Test supply-chain controls
        run: >-
          node --test
          scripts/check-npm-install-scripts.test.mjs
          scripts/check-npm-licenses.test.mjs
          scripts/root-manifest-policy.test.mjs
          scripts/release-sbom.test.mjs
          scripts/supply-chain-workflow.test.mjs

      - name: Enforce exact npm license policy
        run: node scripts/check-npm-licenses.mjs
