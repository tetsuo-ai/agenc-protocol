name: SDK

# Node 24 (LTS) required: the litesvm 1.1.0 native binding nondeterministically
# hangs vitest fork workers (stuck in native code) under node 20/22; stable on
# 24/25 (5/5 stress runs each).

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AGAVE_VERSION: v3.0.13
  AGAVE_INSTALL_INIT_SHA256: 1a4e96d884a4df7f204240ea8a0e2ce5a4ca71257bc5ce32ae140e1f6bc140d8

jobs:
  # Fast checks: no Rust toolchain needed (the IDL is committed).
  sdk-checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: packages/sdk-ts
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Pin declared npm toolchain
        run: npm install --global npm@11.18.0 && npm --version | grep -Fx 11.18.0
        working-directory: ${{ github.workspace }}

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Drift gate (generated client vs committed IDL)
        run: npm run sdk:drift

      - name: Typecheck
        run: npx tsc --noEmit

      # tests/ trailing slash matters: a bare "tests" filter substring-matches
      # tests-e2e/ too, which needs the compiled .so this job doesn't build.
      - name: Structural tests
        run: npm run test:structural

      - name: Build (ESM + CJS + d.ts)
        run: npm run build

      # marketplace-tools and marketplace-mcp intentionally commit dist/ for
      # git/clone consumers. Rebuild from the locked workspace and fail if the
      # generated tree differs from the reviewed artifacts, including ignored
      # untracked chunks that plain `git diff` cannot see.
      - name: Rebuild tracked tools/MCP distributions and reject drift
        working-directory: .
        env:
          LC_ALL: C
          SOURCE_DATE_EPOCH: "0"
          TZ: UTC
        run: |
          npm run build --workspace=@tetsuo-ai/marketplace-tools
          npm run build --workspace=@tetsuo-ai/marketplace-mcp
          git diff --exit-code -- \
            packages/marketplace-tools/dist \
            packages/marketplace-mcp/dist

          unexpected=$(
            git ls-files --others --exclude-standard -- \
              packages/marketplace-tools/dist \
              packages/marketplace-mcp/dist
            git ls-files --others --ignored --exclude-standard -- \
              packages/marketplace-tools/dist \
              packages/marketplace-mcp/dist
          )
          if [[ -n "${unexpected}" ]]; then
            echo "Build produced untracked dist artifacts:" >&2
            echo "${unexpected}" >&2
            exit 1
          fi

      # The worker consumes the workspace SDK's built exports. Keep its fast
      # checks here so they reuse this job's npm install and SDK build.
      - name: Worker typecheck
        run: npm run typecheck
        working-directory: packages/agenc-worker

      - name: Worker unit tests
        run: npm run test:unit
        working-directory: packages/agenc-worker

      - name: Worker build
        run: npm run build
        working-directory: packages/agenc-worker

      - name: Examples compile
        run: npm run examples:check

  # On-chain e2e: builds the program .so with cargo-build-sbf (no anchor CLI;
  # the committed IDL is the interface source of truth) and runs the litesvm suite.
  sdk-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.85.0

      - name: Pin declared npm toolchain
        run: npm install --global npm@11.18.0 && npm --version | grep -Fx 11.18.0

      - name: Cache cargo + sbf target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            programs/agenc-coordination/target
          key: sdk-e2e-sbf-${{ runner.os }}-${{ hashFiles('programs/agenc-coordination/Cargo.lock', 'programs/agenc-coordination/Cargo.toml') }}

      - name: Install Solana platform tools
        run: |
          curl -sSfL --retry 3 \
            "https://github.com/anza-xyz/agave/releases/download/${AGAVE_VERSION}/agave-install-init-x86_64-unknown-linux-gnu" \
            -o "${RUNNER_TEMP}/agave-install-init"
          echo "${AGAVE_INSTALL_INIT_SHA256}  ${RUNNER_TEMP}/agave-install-init" | sha256sum -c -
          chmod +x "${RUNNER_TEMP}/agave-install-init"
          "${RUNNER_TEMP}/agave-install-init" "${AGAVE_VERSION}"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Build program (full surface, default features)
        run: cargo build-sbf --manifest-path programs/agenc-coordination/Cargo.toml

      - name: Install Node dependencies
        run: npm ci

      - name: Install compiled-program integration dependencies
        run: npm ci
        working-directory: tests-integration

      # cargo build-sbf produces the executable but not Anchor's IDL output.
      # The harness intentionally consumes the reviewed committed IDL, so stage
      # it at the legacy path it loads before the compiled suite starts.
      - name: Stage committed IDL for compiled integration harness
        run: |
          mkdir -p target/idl
          cp artifacts/anchor/idl/agenc_coordination.json target/idl/agenc_coordination.json

      # This is the normal PR compiled-program gate, not only a protocol-tag
      # release check. It exercises the root LiteSVM corpus against the fresh
      # production SBF built immediately above.
      - name: Root compiled-program integration suite
        run: node --test tests-integration/*.test.mjs

      - name: Sync testing program asset
        run: npm run testing:sync-so
        working-directory: packages/sdk-ts

      - name: On-chain e2e tests (litesvm)
        run: npx vitest run tests-e2e
        working-directory: packages/sdk-ts

      # Runs here (not sdk-checks): the tarball ships testing-assets/, which
      # needs the freshly built + synced .so this job produces. npm pack also
      # ships dist/, so build first (sdk-checks builds in a separate job).
      - name: Build (ESM + CJS + d.ts)
        run: npm run build
        working-directory: packages/sdk-ts

      # Reuse the production .so built above and the workspace SDK dist instead
      # of paying for a second SBF build solely for the worker's LiteSVM test.
      - name: Worker on-chain e2e tests (litesvm)
        run: npm run test:e2e
        working-directory: packages/agenc-worker

      # Exercise every package that consumes the generated SDK against the same
      # freshly built production program. This catches ABI additions that are
      # type-correct inside sdk-ts but stale in React/tools/MCP/CLI call sites.
      - name: Downstream workspace typechecks
        run: >-
          npm run typecheck
          --workspace=@tetsuo-ai/marketplace-react
          --workspace=@tetsuo-ai/marketplace-tools
          --workspace=@tetsuo-ai/marketplace-mcp
          --workspace=@tetsuo-ai/marketplace-moderation
          --workspace=@tetsuo-ai/agenc-cli

      - name: Downstream workspace tests
        run: >-
          npm test
          --workspace=@tetsuo-ai/marketplace-react
          --workspace=@tetsuo-ai/marketplace-tools
          --workspace=@tetsuo-ai/marketplace-mcp
          --workspace=@tetsuo-ai/marketplace-moderation
          --workspace=@tetsuo-ai/agenc-cli

      - name: React local-validator checkout integration
        run: npm run test:localnet
        working-directory: packages/marketplace-react

      - name: Downstream workspace builds
        run: >-
          npm run build
          --workspace=@tetsuo-ai/marketplace-react
          --workspace=@tetsuo-ai/marketplace-tools
          --workspace=@tetsuo-ai/marketplace-mcp
          --workspace=@tetsuo-ai/marketplace-moderation
          --workspace=@tetsuo-ai/agenc-cli

      - name: MCP examples compile
        run: npm run examples:check
        working-directory: packages/marketplace-mcp

      - name: Marketplace starter install and gate
        working-directory: packages/marketplace-react/examples/marketplace-starter
        run: |
          npm ci
          npm run typecheck
          npm test

      - name: Browser checkout fixture install and build
        working-directory: packages/marketplace-react/test-apps/checkout
        run: |
          npm ci
          npm run build

      - name: Pack smoke (tarball install, ESM + CJS entry points)
        run: node scripts/pack-smoke.mjs
        working-directory: packages/sdk-ts
