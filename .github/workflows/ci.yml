name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Node dependencies
        run: npm ci

      - name: Check program formatting
        run: cargo fmt --manifest-path programs/agenc-coordination/Cargo.toml --all --check

      - name: Check zkVM guest formatting
        run: cargo fmt --manifest-path zkvm/guest/Cargo.toml --all --check

      - name: Run Marketplace V2 bid scenario tests
        run: cargo test --manifest-path programs/agenc-coordination/fuzz/Cargo.toml bid_marketplace

      - name: Verify committed protocol artifacts
        run: npm run artifacts:check

      - name: Build publishable protocol package
        run: npm run build

      - name: Typecheck publishable protocol package
        run: npm run typecheck

      - name: Smoke test packed protocol package
        run: npm run pack:smoke
