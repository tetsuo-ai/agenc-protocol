# Rust dependency policy for every independently resolved Cargo workspace.
# scripts/check-rust-supply-chain-policy.mjs constrains this exception to the
# exact package, checksum, lockfile, owners, review date, and expiry recorded in
# supply-chain/rust-policy.json. cargo-deny alone cannot express that full scope.

[graph]
all-features = true

[advisories]
ignore = [
  { id = "RUSTSEC-2025-0141", reason = "CARGO-MAINT-001: bincode 1.3.3; owners @7etsuo + @signerless; reviewed 2026-07-19; expires 2026-10-17" },
]

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-1-Clause",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "MIT",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8
exceptions = [
  { allow = ["GPL-3.0-only"], crate = "agenc-coordination@0.1.0" },
]

[licenses.private]
ignore = true
registries = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
